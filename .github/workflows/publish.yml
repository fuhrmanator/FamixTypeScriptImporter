name: Publish VSCode Extension

on:
  push:
    tags:
      - 'v*'
    branches:
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          npm install
          cd vscode-extension
          npm install
      - name: Run ts2famix tests
        run: npm test
      - name: Run server tests
        run: cd vscode-extension/server && npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install and build
        run: |
          npm install
          cd vscode-extension
          npm install
          cd server
          npm cache clean --force
          rm -rf node_modules/ts2famix
          npm install
      - name: Publish to marketplace
        run: |
          cd vscode-extension
          npx @vscode/vsce publish --allow-missing-repository --baseContentUrl https://github.com/Leoo-code/FamixTypeScriptImporter/blob/dev/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}